services:
  pi-slack-bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - WORKSPACE_DIRS=/workspace
      - DEFAULT_CWD=/workspace
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /home/skojaku/projects/teams4industry:/workspace
      - pi-sessions:/root/.pi-slack-bot/sessions
      - ./models.json:/root/.pi/agent/models.json:ro

volumes:
  pi-sessions:
